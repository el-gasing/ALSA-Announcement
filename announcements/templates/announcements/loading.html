{% load static %}

<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loading Department</title>
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
  </head>
  <body class="flex min-h-dvh items-start justify-center">
    <div class="mobile-screen loading-screen relative overflow-hidden text-white shadow-[0_0_0_1px_rgba(255,255,255,0.08)]">
      <div class="floating-marks" aria-hidden="true">
        <span class="question-mark qm-1">?</span>
        <span class="question-mark qm-2">?</span>
        <span class="question-mark qm-3">?</span>
        <span class="question-mark qm-4">?</span>
        <span class="question-mark qm-5">?</span>
        <span class="question-mark qm-6">?</span>
        <span class="question-mark question-mark-gold qm-7">?</span>
        <span class="question-mark question-mark-gold qm-8">?</span>
        <span class="question-mark question-mark-gold qm-9">?</span>
        <span class="soft-square sq-1"></span>
        <span class="soft-square sq-2"></span>
        <span class="soft-square sq-3"></span>
        <span class="soft-dot dot-1"></span>
        <span class="soft-dot dot-2"></span>
      </div>

      <header class="absolute left-1/2 top-[1.75%] z-40 flex h-[7%] w-[48%] -translate-x-1/2 items-start justify-center gap-[5.5%]" aria-label="Logo organisasi">
        <img class="w-[48px] object-contain" src="{% static 'img/unhas.png' %}" alt="Logo Universitas Hasanuddin">
        <img class="mt-[7px] w-[72px] object-contain" src="{% static 'img/alsa-white.png' %}" alt="Logo ALSA">
        <img class="logo-gold mt-[3px] h-[66px] w-[45px] object-cover object-center" src="{% static 'img/gold-mark.png' %}" alt="Logo emas">
      </header>

      <main class="absolute inset-0 z-20 flex flex-col items-center">
        <h1 class="absolute top-[28.5%] text-center text-[clamp(42px,9cqw,56px)] font-black leading-none tracking-normal [text-shadow:0_8px_12px_rgba(0,0,0,0.42)]">
          Hang tight....
        </h1>

        <div class="progress-ring absolute top-[38.2%]" style="--progress: 0">
          <span id="loading-percent">0%</span>
        </div>

        <p class="absolute top-[65.1%] w-full text-center text-[clamp(24px,5cqw,34px)] font-black leading-tight [text-shadow:0_8px_12px_rgba(0,0,0,0.42)]">
          Your department is on the way!
        </p>

        <p class="absolute bottom-[3.8%] left-0 w-full text-center text-[clamp(22px,4.6cqw,30px)] font-black leading-[1.45] [text-shadow:0_3px_5px_rgba(0,0,0,0.55)]">
          <span class="block">ALSA,</span>
          <span class="block">Always be One!</span>
        </p>
      </main>
    </div>

    <script>
      const ring = document.querySelector('.progress-ring');
      const percent = document.getElementById('loading-percent');
      const duration = 3600;
      const start = performance.now();

      function tick(now) {
        const progress = Math.min((now - start) / duration, 1);
        const value = Math.round(progress * 100);
        ring.style.setProperty('--progress', value);
        percent.textContent = `${value}%`;

        if (progress < 1) {
          requestAnimationFrame(tick);
        } else {
          window.setTimeout(() => {
            window.location.href = "{% url 'announcements:department' %}";
          }, 300);
        }
      }

      requestAnimationFrame(tick);
    </script>
  </body>
</html>
